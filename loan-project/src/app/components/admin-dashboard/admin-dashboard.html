<div class="dashboard-container">
  <header class="header">
    <h1>Panel de <span class="user-name">Administrador</span></h1>
    <button class="btn-logout" (click)="logout()">Cerrar Sesión</button>
  </header>

  <section class="card full-width">
    <h3>Gestión de Préstamos Globales</h3>
    <table>
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Monto</th>
          <th>Plazo</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let loan of loans">
          <td>{{ loan.userEmail }}</td>
          <td>{{ loan.amount | currency }}</td>
          <td>{{ loan.term }} meses</td>
          <td>
            <span class="badge" [ngClass]="loan.status.toLowerCase()">{{ loan.status }}</span>
          </td>
          <td>
            <div class="actions" *ngIf="loan.status === 'PENDING'">
              <button class="btn-approve" (click)="updateStatus(loan.id, 'APPROVED')">Aprobar</button>
              <button class="btn-reject" (click)="updateStatus(loan.id, 'REJECTED')">Rechazar</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </section>
</div>
